  # ============================================================
  # API KEYS
  # ============================================================
  /api/keys:
    get:
      tags: [API Keys]
      summary: List API keys for the current user
      security:
        - sessionAuth: []
      responses:
        '200':
          description: List of API keys (full key value is never returned here)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      keys:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApiKey'

    post:
      tags: [API Keys]
      summary: Create a new API key
      description: |
        Returns the full API key exactly **once** — it cannot be retrieved again. Save it immediately.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Human-readable label for the key
                permissions:
                  type: object
                  properties:
                    read:
                      type: boolean
                      default: true
                    write:
                      type: boolean
                      default: true
                    bets:
                      type: boolean
                      default: true
                    stats:
                      type: boolean
                      default: true
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration date
      responses:
        '201':
          description: API key created. The `key` field contains the full `sk_` token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      key:
                        type: string
                        description: Full API key (only shown once)
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      keyPrefix:
                        type: string
                      permissions:
                        type: object
                      expiresAt:
                        type: string
                        format: date-time
                        nullable: true
                      createdAt:
                        type: string
                        format: date-time
                  message:
                    type: string

  /api/keys/{id}:
    put:
      tags: [API Keys]
      summary: Update an API key's name or permissions
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                permissions:
                  type: object
      responses:
        '200':
          description: Updated key metadata
        '404':
          description: Key not found

    delete:
      tags: [API Keys]
      summary: Revoke an API key (soft delete)
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Key revoked
        '404':
          description: Key not found

  /api/keys/{id}/usage:
    get:
      tags: [API Keys]
      summary: Get usage logs for an API key
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Usage logs

